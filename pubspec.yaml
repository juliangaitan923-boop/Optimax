name: optimax
description: OptiMax - Acelerador Inteligente de Rendimiento
publish_to: 'none'
version: 1.0.5+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  go_router: ^14.0.0
  fl_chart: ^0.66.0
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  device_info_plus: ^9.1.1
  package_info_plus: ^8.0.0
  logger: ^2.0.2+1
  permission_handler: ^11.3.0
  url_launcher: ^6.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_background: "#6347FF"
  adaptive_icon_foreground: "assets/icon_foreground.png"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/
